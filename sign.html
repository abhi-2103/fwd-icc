<!DOCTYPE html>
<html>
<head>
<title>ICC Login</title>

<style>
body{
font-family: Arial;
background:#0b1d3a;
color:white;
text-align:center;
}

.login-box{
width:300px;
margin:auto;
margin-top:100px;
padding:20px;
background:white;
color:black;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#1e90ff;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h1>ICC Cricket Login</h1>

<div class="login-box">

<input type="text" id="username" placeholder="Enter Username"><br>

<input type="password" id="password" placeholder="Enter Password"><br>

<button onclick="login()">Sign In</button>

<p id="message"></p>

</div>

<script src="sign.js"></script>

</body>
</html>
