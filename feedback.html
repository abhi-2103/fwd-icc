<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>

<style>
body{
font-family: Arial;
background:#0b1d3a;
color:white;
text-align:center;
}

.form-box{
width:400px;
margin:auto;
margin-top:60px;
background:white;
color:black;
padding:20px;
border-radius:10px;
}

input, textarea, select{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#1e90ff;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}
</style>

</head>

<body>

<h1>ICC Website Feedback</h1>

<div class="form-box">

<input type="text" id="name" placeholder="Enter your name"><br>

<input type="email" id="email" placeholder="Enter your email"><br>

<select id="rating">
<option value="">Rate our website</option>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select><br>

<textarea id="feedback" rows="4" placeholder="Write your feedback"></textarea><br>

<button onclick="submitFeedback()">Submit</button>

<p id="message"></p>

</div>
<h2>All feedback (this browser)</h2>
<div id="feedbackList"></div>

<script src="feedback.js"></script>


</body>

</html>
